name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          project_version="$(awk '$1 == "VERSION" { print $2; exit }' CMakeLists.txt)"
          test -n "${project_version}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" != "${project_version}" ]]; then
              echo "Tag version ${version} does not match project version ${project_version}" >&2
              exit 1
            fi
          else
            version="${project_version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  portable:
    name: Ubuntu 24.04 DEB and TXZ
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential cmake fonts-dejavu-core ninja-build qt6-base-dev qt6-svg-dev qt6-tools-dev \
            qtkeychain-qt6-dev libtesseract-dev tesseract-ocr-eng \
            tesseract-ocr-deu tesseract-ocr-rus tesseract-ocr-ukr

      - name: Configure, build and test
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DVERBUNO_BUILD_TESTS=ON \
            -DVERBUNO_REQUIRE_KEYCHAIN=ON
          cmake --build build --parallel 2
          ctest --test-dir build --output-on-failure

      - name: Build DEB and install tree
        run: |
          mkdir -p dist package-output
          cpack --config build/CPackConfig.cmake -G DEB -B package-output
          cpack --config build/CPackConfig.cmake -G TXZ -B package-output
          cp package-output/*.deb package-output/*.tar.xz dist/

      - name: Verify DEB and install tree
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          deb_file="$(find dist -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "${deb_file}"
          deb_file="$(realpath "${deb_file}")"
          dpkg-deb --info "${deb_file}"
          dpkg-deb --contents "${deb_file}"
          dpkg-deb --field "${deb_file}" Depends | tee /tmp/verbuno-deb-depends.txt
          grep -q 'tesseract-ocr-eng' /tmp/verbuno-deb-depends.txt
          if dpkg-deb --field "${deb_file}" Depends | grep -Eq '(^|, )[[:alnum:].+-]+-dev([ ,]|$)'; then
            echo "DEB unexpectedly depends on a development package" >&2
            exit 1
          fi
          sudo apt-get install --no-install-recommends -y "${deb_file}"
          dpkg-query --show --showformat='${Package} ${Version}\n' verbuno
          dpkg --verify verbuno
          ldd /usr/bin/verbuno | tee /tmp/verbuno-deb-ldd.txt
          ! grep -q 'not found' /tmp/verbuno-deb-ldd.txt
          tree_file="dist/Verbuno-${VERSION}-x86_64.tar.xz"
          test -f "${tree_file}"
          tar -tJf "${tree_file}" | tee /tmp/verbuno-tree.txt
          grep -Eq '(^|/)bin/verbuno$' /tmp/verbuno-tree.txt
          if tar -tJf "${tree_file}" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "Install tree contains an unsafe path" >&2
            exit 1
          fi

      - name: Create source, PKGBUILD and SPDX artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git archive --format=tar --prefix="Verbuno-${VERSION}/" HEAD \
            | xz -T0 -9 > "dist/Verbuno-${VERSION}-source.tar.xz"
          source_hash="$(sha256sum "dist/Verbuno-${VERSION}-source.tar.xz" | cut -d' ' -f1)"
          sed -e "s/@VERSION@/${VERSION}/g" -e "s/@SOURCE_SHA256@/${source_hash}/g" \
            packaging/arch/PKGBUILD.in > dist/PKGBUILD
          packaging/scripts/generate-sbom.sh "$VERSION" > "dist/Verbuno-${VERSION}.spdx"
          grep -Fq "sha256sums=('${source_hash}')" dist/PKGBUILD

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Verbuno-portable-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

  rpm:
    name: Fedora 44 RPM
    needs: prepare
    runs-on: ubuntu-24.04
    container: fedora:44
    timeout-minutes: 35

    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install --setopt=install_weak_deps=False -y \
            cmake dejavu-sans-fonts gcc-c++ git-core ninja-build rpm-build \
            qt6-qtbase-devel qt6-qtsvg-devel qt6-qttools-devel qtkeychain-qt6-devel \
            tesseract-devel tesseract-langpack-eng tesseract-langpack-deu \
            tesseract-langpack-rus tesseract-langpack-ukr

      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure, build and test
        run: |
          cmake -S . -B build-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DVERBUNO_BUILD_TESTS=ON \
            -DVERBUNO_REQUIRE_KEYCHAIN=ON
          cmake --build build-rpm --parallel 2
          ctest --test-dir build-rpm --output-on-failure

      - name: Build and verify Fedora RPM
        run: |
          mkdir -p dist package-output
          cpack --config build-rpm/CPackConfig.cmake -G RPM -B package-output
          cp package-output/*.rpm dist/
          rpm_file="$(find dist -maxdepth 1 -type f -name '*.rpm' -print -quit)"
          test -n "${rpm_file}"
          rpm -qpl "${rpm_file}"
          rpm -qpR "${rpm_file}" | sort | tee /tmp/verbuno-rpm-requires.txt
          grep -q 'libqt6keychain\.so\.1' /tmp/verbuno-rpm-requires.txt
          grep -q 'tesseract-langpack-eng' /tmp/verbuno-rpm-requires.txt
          dnf install --setopt=install_weak_deps=False -y "${rpm_file}"
          rpm -q verbuno
          rpm -V verbuno
          ldd /usr/bin/verbuno | tee /tmp/verbuno-rpm-ldd.txt
          ! grep -q 'not found' /tmp/verbuno-rpm-ldd.txt

      - name: Upload Fedora RPM
        uses: actions/upload-artifact@v7
        with:
          name: Verbuno-rpm-${{ needs.prepare.outputs.version }}
          path: dist/*.rpm
          if-no-files-found: error

  arch:
    name: Arch Linux package
    needs: [prepare, portable]
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    timeout-minutes: 40

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cmake git ninja qt6-base qt6-svg qt6-tools qtkeychain-qt6 tesseract ttf-dejavu \
            tesseract-data-eng tesseract-data-deu tesseract-data-rus tesseract-data-ukr
          sed -i '/^NoExtract[[:space:]]*=.*usr\/share\/doc/d' /etc/pacman.conf

      - name: Download source and PKGBUILD
        uses: actions/download-artifact@v8
        with:
          name: Verbuno-portable-${{ needs.prepare.outputs.version }}
          path: dist-portable

      - name: Build package as an unprivileged user
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          install -d -m 0755 /tmp/verbuno-package dist
          cp dist-portable/PKGBUILD \
            "dist-portable/Verbuno-${VERSION}-source.tar.xz" \
            /tmp/verbuno-package/
          useradd --create-home builder
          chown -R builder:builder /tmp/verbuno-package
          runuser -u builder -- bash -lc \
            'cd /tmp/verbuno-package && LC_ALL=C makepkg --cleanbuild --noconfirm'
          cp "/tmp/verbuno-package/verbuno-${VERSION}-1-x86_64.pkg.tar.zst" dist/

      - name: Verify and install Arch package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          package_file="dist/verbuno-${VERSION}-1-x86_64.pkg.tar.zst"
          test -f "${package_file}"
          pacman -Qip "${package_file}" | tee /tmp/verbuno-arch-info.txt
          grep -q 'tesseract-data-eng' /tmp/verbuno-arch-info.txt
          pacman -Qlp "${package_file}" | tee /tmp/verbuno-arch-files.txt
          grep -q 'usr/bin/verbuno$' /tmp/verbuno-arch-files.txt
          pacman -U --noconfirm "${package_file}"
          pacman -Q verbuno
          pacman -Qkk verbuno
          ldd /usr/bin/verbuno | tee /tmp/verbuno-arch-ldd.txt
          ! grep -q 'not found' /tmp/verbuno-arch-ldd.txt

      - name: Upload Arch package
        uses: actions/upload-artifact@v7
        with:
          name: Verbuno-arch-${{ needs.prepare.outputs.version }}
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

  publish:
    name: Verify and publish release
    needs: [prepare, portable, rpm, arch]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download portable artifacts
        uses: actions/download-artifact@v8
        with:
          name: Verbuno-portable-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Fedora RPM
        uses: actions/download-artifact@v8
        with:
          name: Verbuno-rpm-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Arch package
        uses: actions/download-artifact@v8
        with:
          name: Verbuno-arch-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Verify artifact set and create checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          deb=(dist/verbuno_"${VERSION}"_*.deb)
          rpm=(dist/verbuno-"${VERSION}"-*.x86_64.rpm)
          arch=(dist/verbuno-"${VERSION}"-1-x86_64.pkg.tar.zst)
          tree=(dist/Verbuno-"${VERSION}"-x86_64.tar.xz)
          source=(dist/Verbuno-"${VERSION}"-source.tar.xz)
          spdx=(dist/Verbuno-"${VERSION}".spdx)
          pkgbuild=(dist/PKGBUILD)
          test "${#deb[@]}" -eq 1
          test "${#rpm[@]}" -eq 1
          test "${#arch[@]}" -eq 1
          test "${#tree[@]}" -eq 1
          test "${#source[@]}" -eq 1
          test "${#spdx[@]}" -eq 1
          test "${#pkgbuild[@]}" -eq 1
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 7
          if find dist -maxdepth 1 -type f -iname '*AppImage*' | grep -q .; then
            echo "Unexpected AppImage artifact" >&2
            exit 1
          fi
          if tar -tJf "${source[0]}" | grep -Eq '(^|/)(\.env[^/]*|id_rsa|id_ed25519|[^/]*AppImage[^/]*)$'; then
            echo "Source archive contains a forbidden file" >&2
            exit 1
          fi
          source_hash="$(sha256sum "${source[0]}" | cut -d' ' -f1)"
          grep -Fq "sha256sums=('${source_hash}')" "${pkgbuild[0]}"
          grep -Fq "PackageVersion: ${VERSION}" "${spdx[0]}"
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort --zero-terminated \
            | xargs --null --no-run-if-empty sha256sum > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload verified release set
        uses: actions/upload-artifact@v7
        with:
          name: Verbuno-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: >-
          github.ref_type == 'tag' ||
          (github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'release:'))
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          target_commitish: ${{ github.sha }}
          name: Verbuno ${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: dist/*
